name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-flight run when a branch is pushed again.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt-clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No toolchain action needed: rustup is preinstalled on the runner and
      # auto-installs the version + components pinned in rust-toolchain.toml.
      # `rustup show` forces that install before the cache key is computed.
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rustup auto-installs the version pinned in rust-toolchain.toml; see fmt-clippy.
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --all-features
